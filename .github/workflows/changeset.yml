name: Changeset

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changeset:
    name: Changeset required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@45125827b90054fcec167940c5e5bc67ceb3b068 # v3.0.2
        id: changes
        with:
          filters: |
            requires_changeset:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'extensions/**'
              - 'prompts/**'
              - 'skills/**'
              - 'src/**'
              - 'themes/**'
              - 'tsconfig.json'
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        if: steps.changes.outputs.requires_changeset == 'true'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.changes.outputs.requires_changeset == 'true'
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.requires_changeset == 'true'
      - run: pnpm changeset:check
        if: steps.changes.outputs.requires_changeset == 'true'
      - run: echo 'No changeset required for docs/config-only PR.'
        if: steps.changes.outputs.requires_changeset != 'true'
