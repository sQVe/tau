language: 'en-US'
tone_instructions: 'Be concise and direct. Flag real issues; skip nitpicks on style already enforced by oxlint and oxfmt.'

reviews:
  profile: 'assertive'
  high_level_summary: false
  collapse_walkthrough: true
  review_status: true
  abort_on_close: true
  poem: false
  changed_files_summary: false
  sequence_diagrams: false
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

  path_filters:
    - '!**/dist/**'
    - '!**/coverage/**'
    - '!**/node_modules/**'

  auto_review:
    enabled: true
    auto_incremental_review: false
    drafts: false
    ignore_title_keywords: ['WIP']
